<!DOCTYPE html>
<html>
<head>
    <title>Diet & Exercise Planner</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: 40px auto; background: #f4f4f4; padding: 20px; }
        input, select, button { padding: 10px; margin: 8px 0; width: 100%; }
        button { background-color: green; color: white; border: none; cursor: pointer; }
        .plan { background: white; padding: 20px; margin-top: 20px; white-space: pre-wrap; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>One-Month Diet & Exercise Planner</h1>
    <p>Enter your details to get a personalised plan</p>

    <form method="POST">
        <label>BMI:</label>
        <input type="number" name="bmi" step="0.1" placeholder="e.g. 17.5" required>

        <label>Age:</label>
        <input type="number" name="age" placeholder="e.g. 22" required>

        <label>Gender:</label>
        <select name="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <button type="submit">Generate Plan</button>
    </form>

    {% if plan %}
        <div class="plan">
            <h2>Your Personalised Plan</h2>
            {{ plan }}
        </div>
    {% endif %}
</body>
</html>
